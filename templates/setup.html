<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Icons/favicon.png') }}">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#0a0a0a;
            font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif;
            color:#fff;
            overflow:hidden;
        }

        /* Ambient glow */
        body::before{
            content:'';
            position:fixed;
            width:600px;height:600px;
            top:50%;left:50%;
            transform:translate(-50%,-50%);
            background:radial-gradient(circle, rgba(128,128,128,0.06) 0%, transparent 70%);
            pointer-events:none;
            z-index:0;
        }

        .setup{
            position:relative;
            z-index:1;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:48px;
            padding:60px 48px;
            max-width:520px;
            width:100%;
        }

        .setup-title{
            font-size:28px;
            font-weight:700;
            letter-spacing:-0.02em;
            text-align:center;
            line-height:1.2;
        }

        .setup-subtitle{
            font-size:15px;
            font-weight:400;
            color:rgba(255,255,255,0.45);
            text-align:center;
            margin-top:-32px;
        }

        .device-grid{
            display:flex;
            gap:32px;
            justify-content:center;
        }

        .device-card{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:16px;
            padding:32px 28px 24px;
            border-radius:24px;
            cursor:pointer;
            transition:all 0.3s ease;
            background:rgba(128,128,128,0.08);
            border:1.5px solid rgba(255,255,255,0.06);
            backdrop-filter:blur(40px);
            -webkit-backdrop-filter:blur(40px);
            width:190px;
            position:relative;
        }

        .device-card:hover{
            background:rgba(128,128,128,0.15);
            border-color:rgba(255,255,255,0.18);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
            transform:translateY(-4px);
        }

        .device-card.selected{
            background:rgba(128,128,128,0.18);
            border-color:rgba(255,255,255,0.3);
            box-shadow:0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
        }

        .device-card img{
            width:100px;
            height:100px;
            object-fit:contain;
            filter:brightness(0.95);
            transition:transform 0.3s ease;
        }

        .device-card:hover img{
            transform:scale(1.05);
        }

        .device-label{
            font-size:15px;
            font-weight:600;
            letter-spacing:-0.01em;
            color:rgba(255,255,255,0.8);
        }

        .device-check{
            position:absolute;
            top:12px;right:12px;
            width:22px;height:22px;
            border-radius:50%;
            border:1.5px solid rgba(255,255,255,0.15);
            transition:all 0.25s ease;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .device-card.selected .device-check{
            background:rgba(255,255,255,0.9);
            border-color:rgba(255,255,255,0.9);
        }

        .device-check svg{
            width:12px;height:12px;
            opacity:0;
            transition:opacity 0.25s;
        }

        .device-card.selected .device-check svg{
            opacity:1;
        }

        .setup-btn{
            padding:14px 48px;
            border-radius:14px;
            border:none;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            color:#fff;
            font-size:16px;
            font-weight:600;
            letter-spacing:-0.01em;
            cursor:pointer;
            transition:all 0.25s ease;
            border:1px solid rgba(255,255,255,0.1);
            opacity:0.35;
            pointer-events:none;
        }

        .setup-btn.ready{
            opacity:1;
            pointer-events:auto;
        }

        .setup-btn.ready:hover{
            background:rgba(255,255,255,0.2);
            border-color:rgba(255,255,255,0.25);
            box-shadow:0 4px 16px rgba(0,0,0,0.2);
        }

        /* Existing devices */
        .existing{
            margin-top:16px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:12px;
        }

        .existing-label{
            font-size:12px;
            font-weight:500;
            color:rgba(255,255,255,0.25);
            text-transform:uppercase;
            letter-spacing:0.08em;
        }

        .existing-list{
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            justify-content:center;
        }

        .existing-chip{
            padding:8px 16px;
            border-radius:10px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            color:rgba(255,255,255,0.5);
            font-size:13px;
            font-weight:500;
            text-decoration:none;
            transition:all 0.2s;
        }

        .existing-chip:hover{
            background:rgba(255,255,255,0.1);
            color:rgba(255,255,255,0.8);
            border-color:rgba(255,255,255,0.15);
        }

        .existing-chip .chip-type{
            font-size:11px;
            opacity:0.5;
            margin-left:6px;
        }
    </style>
</head>
<body>
    <div class="setup">
        <div class="setup-title">Choose your device</div>
        <div class="setup-subtitle">Widgets will be sized to fit your screen</div>

        <div class="device-grid">
            <div class="device-card" data-type="laptop" onclick="pick(this)">
                <div class="device-check">
                    <svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5.5" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <img src="/static/Icons/macbook-pro.png" alt="Laptop">
                <span class="device-label">Laptop</span>
            </div>
            <div class="device-card" data-type="tablet" onclick="pick(this)">
                <div class="device-check">
                    <svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5.5" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <img src="/static/Icons/ipad.png" alt="Tablet">
                <span class="device-label">Tablet</span>
            </div>
        </div>

        <form method="POST" action="/setup" id="setup-form">
            <input type="hidden" name="device_type" id="device-type" value="">
            <button type="submit" class="setup-btn" id="go-btn">Continue</button>
        </form>

        {% if devices %}
        <div class="existing">
            <div class="existing-label">or switch to existing</div>
            <div class="existing-list">
                {% for d in devices %}
                <a class="existing-chip" href="/switch/{{ d.id }}">
                    {{ d.name }}<span class="chip-type">{{ d.type }}</span>
                </a>
                {% endfor %}
            </div>
        </div>
        {% endif %}
    </div>

    <script>
        var selected = null;
        function pick(el) {
            document.querySelectorAll('.device-card').forEach(function(c) {
                c.classList.remove('selected');
            });
            el.classList.add('selected');
            selected = el.dataset.type;
            document.getElementById('device-type').value = selected;
            document.getElementById('go-btn').classList.add('ready');
        }
    </script>
</body>
</html>
