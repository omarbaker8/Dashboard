<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Icons/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-extra.min.css" rel="stylesheet"/>
</head>
<body style="background: {{ config.background }};">
    {% if config.bg_video %}
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="{{ config.bg_video }}">
    </video>
    {% endif %}
    {% if config.bg_blur or config.bg_dim %}
    <div class="bg-overlay" style="
        {% if config.bg_blur %}backdrop-filter: blur({{ config.bg_blur }}px); -webkit-backdrop-filter: blur({{ config.bg_blur }}px);{% endif %}
        {% if config.bg_dim %}background: rgba(0,0,0,{{ config.bg_dim / 100.0 }});{% endif %}
    "></div>
    {% endif %}
    <header>
        <img src="{{ url_for('static', filename='Icons/favicon.png') }}" class="header-logo" alt="Dashboard">
        {% if device %}<span class="header-device">{{ device.name }}</span>{% endif %}
        <div class="header-spacer"></div>
        <a href="/settings" class="header-icon-btn" title="Settings">
            <img src="{{ url_for('static', filename='Icons/settings.svg') }}" alt="Settings">
        </a>
    </header>

    <div class="grid-stack" id="dashboard-grid">
        {% for widget in widgets %}
        <div class="grid-stack-item"
             gs-id="{{ widget.id }}"
             gs-x="{{ widget.x }}"
             gs-y="{{ widget.y }}"
             gs-w="{{ widget.w }}"
             gs-h="{{ widget.h }}"
             gs-min-w="1"
             gs-min-h="1"
             {% if widget.lock_ratio %}data-lock-ratio="1"{% endif %}>
            <div class="grid-stack-item-content">
                <div class="widget-item" style="{{ widget.css }}"
                     {% if widget.lat is defined %}data-lat="{{ widget.lat }}"{% endif %}
                     {% if widget.lng is defined %}data-lng="{{ widget.lng }}"{% endif %}
                     {% if widget.timezone is defined %}data-timezone="{{ widget.timezone }}"{% endif %}
                     {% if widget.city is defined %}data-city="{{ widget.city }}"{% endif %}
                     {% if widget.refresh_interval is defined %}data-refresh="{{ widget.refresh_interval }}"{% endif %}
                     {% if widget.hours_to_show is defined %}data-hours="{{ widget.hours_to_show }}"{% endif %}
                     {% if widget.levels is defined %}data-levels="{{ widget.levels }}"{% endif %}
                     {% if widget.stroke is defined %}data-stroke="{{ widget.stroke }}"{% endif %}
                     {% if widget.split_ratio is defined %}data-split="{{ widget.split_ratio }}"{% endif %}
                     {% if widget.categories is defined %}data-categories="{{ widget.categories | join(',') }}"{% endif %}>
                    {{ widget.content | safe }}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
